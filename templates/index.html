{% extends "base.html" %}

{% block content %}
<div class="hero">
    <h1>AI Resume Screening & Candidate Management</h1>
    <p>Upload resumes, extract skills automatically, and get AI-powered matching scores</p>
    <div class="cta-buttons">
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Go to Dashboard</a>
        {% else %}
            <a href="{{ url_for('login') }}" class="btn btn-primary">Get Started</a>
            <a href="{{ url_for('signup') }}" class="btn btn-secondary">Create Account</a>
        {% endif %}
    </div>
</div>
{% endblock %}
