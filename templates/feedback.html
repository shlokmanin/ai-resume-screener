{% extends "base.html" %}

{% block title %}Feedback - AI Resume Screening{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" style="max-width: 500px;">
        <h2>Help Us Improve</h2>
        <p>Your feedback helps make the AI better!</p>
        
<form method="POST" id="feedbackForm">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="rating">Rating:</label>
                <select id="rating" name="rating" required>
                    <option value="">Select rating</option>
                    <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                    <option value="4">⭐⭐⭐⭐ Good</option>
                    <option value="3">⭐⭐⭐ Average</option>
                    <option value="2">⭐⭐ Poor</option>
                    <option value="1">⭐ Very Poor</option>
                </select>
            </div>
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required placeholder="What did you like? What can be improved?"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Submit Feedback</button>
        </form>
        
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary" style="margin-top: 1rem; display: inline-block;">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
